{# Shared <head> content for all pages #}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/countup.js@2.8.0/dist/countUp.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html {
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  body {
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    overscroll-behavior-y: none;
  }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .modal-backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  @keyframes spin-slow { to { transform: rotate(360deg); } }
  .loading-spin { animation: spin-slow 1s linear infinite; }
  .detail-desc { white-space: pre-line; }
  .safe-bottom { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
  .scroll-snap-x { overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .scroll-snap-x::-webkit-scrollbar { display: none; }
  .scroll-snap-x > * { scroll-snap-align: start; }
  @media (hover: none) {
    .page-card:active { transform: scale(0.98); }
    button:active, a:active { opacity: 0.7; }
  }
  .mobile-action-bar { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  /* iOS touch targets - minimum 44px */
  @media (pointer: coarse) {
    button, a, summary, [onclick] { min-height: 44px; }
    .nav-btn { min-width: 44px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
  }
  /* iOS notch/dynamic island safe area for fixed elements */
  .fixed-safe-top { top: max(0.75rem, env(safe-area-inset-top)); }
  .fixed-safe-bottom { bottom: max(0.75rem, env(safe-area-inset-bottom)); }
  /* Prevent iOS bounce on modals */
  .modal-noscroll { position: fixed; width: 100%; overflow: hidden; }
  /* iOS standalone mode adjustments */
  @media (display-mode: standalone) {
    body { padding-top: max(1rem, env(safe-area-inset-top)); }
  }
</style>
<script>
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);
  // Ensure scroll to top on every page navigation (iOS Safari caches scroll)
  window.addEventListener('pageshow', function(e) { if (e.persisted) window.scrollTo(0, 0); });
</script>
